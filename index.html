<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The True Man</title>
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

body{
    margin:0;
    padding:0;
    background:black;
    font-family:Arial, sans-serif;
}

/* ---------- TOP HEADER ---------- */

.top{
    width:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:12px 10px;
    background:whitesmoke;
}

.sizing{
    width:50px;
    height:50px;
    border-radius:50%;
    margin-right: 25px;
}

.title{
    font-size:24px;
    font-weight:bold;
    text-align:center;
    margin-right: 25px;
}

/* ---------- NAVBAR ---------- */

.nav-barr{
    width:100%;
    display:flex;
    justify-content:space-around;
    align-items:center;
    flex-wrap:wrap;
    background:#222;
    padding:10px 5px;
}

.links{
    color:whitesmoke;
    font-size:14px;
    padding:8px 10px;
    text-align:center;
}

/* ---------- CAROUSEL ---------- */

#demo{
    width:100%;
    max-width:375px;

    /* Screen height adjustment */
    height:calc(100vh - 180px);

    margin:10px auto;
    overflow:hidden;
    border-radius:10px;
}

.carousel-inner,
.carousel-item,
.carousel-item img{
    width:100%;
    height:calc(100vh - 180px);
    object-fit:cover;
}


/* ---------- FOOTER ---------- */

.footer{

    width:100%;
    height:fit-content;
    background:whitesmoke;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;          /* reduced gap */
    padding:3px 1;     /* reduced padding */
    flex-wrap:wrap;
}

.icons{
    width:21px;
    height:22px;
}

/* ---------- MOBILE RESPONSIVE ---------- */

@media screen and (max-width:375px){

    .title{
        font-size:18px;
    }

    .links{
        font-size:12px;
        padding:6px;
    }

    #demo,
    .carousel-inner,
    .carousel-item,
    .carousel-item img{

        /* fits inside 640px screen with footer visible */
        height:calc(100vh - 180px);
    }
}

</style>

</head>

<body>

<!-- TOP / TITLE -->
<div class="top">
    <img src="logo.jpeg" class="sizing">
    <div class="title">𝐓𝐡𝐞 𝐓𝐫𝐮𝐞 𝐌𝐚𝐧</div>
</div>

<!-- NAVIGATION BAR -->
<div class="nav-barr">
    <div class="links">Quran</div>
    <div class="links">Ahadees</div>
    <div class="links">Islamic Books</div>
    <div class="links">Blogs</div>
</div>

<!-- CAROUSEL -->
<div id="demo" class="carousel slide" data-ride="carousel">

    <!-- Indicators -->
    <ul class="carousel-indicators">
        <li data-target="#demo" data-slide-to="0" class="active"></li>
        <li data-target="#demo" data-slide-to="1"></li>
        <li data-target="#demo" data-slide-to="2"></li>
    </ul>

    <!-- Slides -->
    <div class="carousel-inner">

        <div class="carousel-item active">
            <img src="1.jpg" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="2.jpg" class="d-block w-100">
        </div>

        <div class="carousel-item">
            <img src="3.jpg" class="d-block w-100">
        </div>

    </div>

    <!-- Controls -->
    <a class="carousel-control-prev" href="#demo" data-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </a>

    <a class="carousel-control-next" href="#demo" data-slide="next">
        <span class="carousel-control-next-icon"></span>
    </a>

</div>

<!-- FOOTER -->
<div class="footer">

    <a href="https://www.instagram.com/thetrueman11/" target="_blank">
        <i class="fa fa-instagram icons" style="font-size:20px;color:black"></i>
    </a>

    <a href="https://www.facebook.com/profile.php?id=61589193935626" target="_blank">
        <i class="fa fa-facebook icons" style="font-size:20px;color:black"></i>
    </a>

    <a href="https://www.youtube.com/@TheTrueman-tm" target="_blank">
        <i class="fa fa-youtube icons" style="font-size:20px;color:black"></i>
    </a>

    <a href="https://www.tiktok.com/@thetrueman1.1" target="_blank">
        <img src="tiktok.png" class="icons" alt="tiktok">
    </a>

    <a href="https://x.com/true_man11" target="_blank">
        <img src="x.png" class="icons" alt="x">
    </a>

</div>

</body>
</html>
